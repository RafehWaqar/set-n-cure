<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order placed — Amber &amp; Bloom Resin Co.</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div data-header></div>

<main>
  <section class="section wrap" data-confirm-root style="min-height:50vh;">
    <!-- filled by JS -->
  </section>
</main>

<div data-footer></div>

<script src="data.js"></script>
<script src="app.js"></script>
<script>
  renderHeader();
  renderFooter();

  const raw = sessionStorage.getItem("abr_last_order");
  const root = document.querySelector("[data-confirm-root]");

  if(!raw){
    root.innerHTML = `
      <div class="confirm-box">
        <h1>No recent order found</h1>
        <p style="color:#5b524b;">Head back to the catalogue to start an order.</p>
        <a href="products.html" class="btn btn-primary" style="margin-top:16px;">Shop products</a>
      </div>`;
  } else {
    const order = JSON.parse(raw);
    root.innerHTML = `
      <div class="confirm-box">
        <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <circle cx="50" cy="50" r="46" fill="#1f3b2c"/>
          <path d="M30 52 L44 66 L72 36" fill="none" stroke="#e8c77a" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <span class="eyebrow">Order confirmed</span>
        <h1>Thank you &mdash; it's in the queue.</h1>
        <p style="color:#5b524b;">Order <strong>${order.id}</strong> has been placed. We start pouring within 1&ndash;2 days and the whole piece is ready in 15&ndash;18 days.</p>

        <div class="form-card" style="text-align:left; margin-top:30px;">
          <h3>Order ${order.id}</h3>
          ${order.items.map(i=>`
            <div class="order-line">
              <span class="order-line__name">${i.name} &times; ${i.qty}</span>
              <span>${money(i.price * i.qty)}</span>
            </div>`).join("")}
          <div class="summary-row" style="margin-top:10px;"><span>Subtotal</span><span>${money(order.subtotal)}</span></div>
          <div class="summary-row"><span>Shipping</span><span>${money(order.shipping)}</span></div>
          <div class="summary-row total"><span>Total</span><span>${money(order.total)}</span></div>
          <p class="field-note" style="margin-top:14px;">Shipping to ${order.address.name}, ${order.address.street}, ${order.address.city}</p>
        </div>

        <div style="margin-top:26px; display:flex; gap:14px; justify-content:center; flex-wrap:wrap;">
          <a href="products.html" class="btn btn-ghost">Continue shopping</a>
          <a href="account.html" class="btn btn-primary">View order history</a>
        </div>
      </div>`;
    sessionStorage.removeItem("abr_last_order");
  }
</script>
</body>
</html>
